---
name: Push
on: push

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402
        name: Run StyLua
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.4.1
          args: --check .
